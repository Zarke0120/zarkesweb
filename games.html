<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=yes">
    <title>小游戏导航</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }
         html {
            color-scheme: dark;
        }
        body {
            background: #0f1724;
            font-family: system-ui, -apple-system, 'Segoe UI', 'Roboto', 'Helvetica Neue', Helvetica, 'Noto Sans', sans-serif;
            color: #e2e8f0;
            line-height: 1.4;
            padding: 1.5rem 1rem 2rem;
            min-height: 100vh;
        }

        /* 主容器 - 优雅居中，最大宽度保证大屏舒适 */
        .container {
            max-width: 560px;
            margin: 0 auto;
            width: 100%;
        }

        /* 头部区域 - 现代简约，留白舒适 */
        .header {
            text-align: center;
            margin-bottom: 2.2rem;
            padding: 0 0.5rem;
        }

        .blog-badge {
            display: inline-flex;
            align-items: center;
            gap: 0.5rem;
            background: rgba(148, 163, 184, 0.08);
            backdrop-filter: blur(2px);
            padding: 0.3rem 1rem;
            border-radius: 40px;
            font-size: 0.8rem;
            letter-spacing: 0.3px;
            color: #8899b4;
            margin-bottom: 1.2rem;
            border: 0.5px solid rgba(148, 163, 184, 0.15);
        }

        .blog-badge span {
            font-weight: 500;
        }

        .header h1 {
            font-size: 2rem;
            font-weight: 620;
            letter-spacing: -0.3px;
            background: linear-gradient(135deg, #c8d6e5, #e8edf3);
            background-clip: text;
            -webkit-background-clip: text;
            color: transparent;
            margin-bottom: 0.5rem;
        }

        .subhead {
            color: #8899b4;
            font-size: 0.95rem;
            font-weight: 450;
            margin-top: 0.2rem;
            border-bottom: 1px solid #263348;
            display: inline-block;
            padding-bottom: 0.25rem;
        }

        /* 游戏网格 - 卡片布局，弹性现代 */
        .games-grid {
            display: flex;
            flex-direction: column;
            gap: 1.25rem;
            margin-bottom: 2rem;
        }

        /* 卡片通用样式 - 圆润柔和，轻量阴影，深色底色 */
        .game-card {
            background: #1a2332;
            border-radius: 28px;
            box-shadow: 0 4px 14px rgba(0, 0, 0, 0.18), 0 1px 3px rgba(0, 0, 0, 0.12);
            transition: transform 0.2s ease, box-shadow 0.25s ease, background 0.25s ease, border-color 0.25s ease;
            cursor: pointer;
            display: flex;
            align-items: center;
            padding: 1rem 1.25rem 1rem 1.25rem;
            gap: 1rem;
            border: 1px solid #263348;
            backdrop-filter: blur(0px);
            user-select: none;
        }

        /* 悬停效果 - 轻微提升，保留干净气质 */
        .game-card:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 26px rgba(0, 0, 0, 0.28), 0 3px 8px rgba(0, 0, 0, 0.16);
            border-color: #3a5068;
            background: #1e2a3b;
        }

        .game-card:active {
            transform: translateY(1px);
            transition: 0.05s;
        }

        .game-card:focus-visible {
            outline: 2px solid #6a9cc4;
            outline-offset: 2px;
            border-radius: 28px;
        }

        /* 图标容器 - 用轻量微背景突出icon */
        .game-icon {
            width: 58px;
            height: 58px;
            background: #1e2a3a;
            border-radius: 24px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 2.2rem;
            flex-shrink: 0;
            transition: background 0.2s;
            box-shadow: inset 0 0 0 1px rgba(255, 255, 255, 0.05), 0 1px 3px rgba(0, 0, 0, 0.22);
        }

        .game-card:hover .game-icon {
            background: #243040;
        }

        /* 游戏信息 */
        .game-info {
            flex: 1;
        }

        .game-title {
            font-size: 1.32rem;
            font-weight: 590;
            letter-spacing: -0.2px;
            color: #e8edf3;
            margin-bottom: 0.25rem;
            display: flex;
            align-items: center;
            flex-wrap: wrap;
            gap: 0.5rem;
        }

        .game-desc {
            font-size: 0.82rem;
            color: #8899b4;
            line-height: 1.3;
            display: flex;
            align-items: center;
            gap: 0.5rem;
            flex-wrap: wrap;
        }

        /* 状态标签 - 微妙区分 */
        .status {
            font-size: 0.7rem;
            font-weight: 500;
            padding: 0.2rem 0.7rem;
            border-radius: 40px;
            background: #1e2a38;
            color: #8899b4;
            letter-spacing: 0.2px;
            display: inline-flex;
            align-items: center;
            gap: 4px;
        }

        .status.available {
            background: #1a2f3f;
            color: #7ab8e0;
            border: 0.5px solid #2a4a5f;
        }

        .status.coming {
            background: #1e2430;
            color: #7c8b9f;
            border: 0.5px solid #2a3340;
        }

        /* 箭头指示符 */
        .arrow-indicator {
            margin-left: 0.25rem;
            font-size: 1.1rem;
            color: #5a6e85;
            transition: transform 0.2s, color 0.2s;
        }

        .game-card:hover .arrow-indicator {
            transform: translateX(3px);
            color: #8aa8c8;
        }

        /* 底部小提示区域 - 极简干净 */
        .footer-note {
            text-align: center;
            margin-top: 2.2rem;
            padding-top: 1rem;
            border-top: 1px solid #263348;
            font-size: 0.75rem;
            color: #6b7d95;
            letter-spacing: 0.2px;
        }

        .footer-note a {
            color: #8aa4c0;
            text-decoration: none;
            border-bottom: 0.5px dotted #3a5068;
            transition: color 0.2s, border-color 0.2s;
        }

        .footer-note a:hover {
            color: #a8c4de;
            border-bottom-color: #5a7e9e;
        }

        /* 自定义toast通知 - 轻量现代，深色适配 */
        .toast-notify {
            position: fixed;
            bottom: 28px;
            left: 50%;
            transform: translateX(-50%) translateY(20px);
            background: rgba(40, 55, 75, 0.92);
            backdrop-filter: blur(14px);
            -webkit-backdrop-filter: blur(14px);
            color: #f1f5f9;
            padding: 0.7rem 1.4rem;
            border-radius: 48px;
            font-size: 0.85rem;
            font-weight: 480;
            letter-spacing: 0.3px;
            box-shadow: 0 8px 24px rgba(0, 0, 0, 0.35), 0 2px 6px rgba(0, 0, 0, 0.2);
            z-index: 1000;
            opacity: 0;
            transition: opacity 0.2s, transform 0.25s ease;
            pointer-events: none;
            white-space: nowrap;
            max-width: 85vw;
            white-space: normal;
            text-align: center;
            line-height: 1.3;
            border: 0.5px solid rgba(255, 255, 255, 0.1);
        }

        .toast-notify.show {
            opacity: 1;
            transform: translateX(-50%) translateY(0);
        }

        /* 手机专属优化 - 适当增加点击区域，调整内边距 */
        @media (max-width: 480px) {
            body {
                padding: 1rem 0.85rem 1.8rem;
            }
            .game-card {
                padding: 0.9rem 1.1rem;
                gap: 0.9rem;
            }
            .game-icon {
                width: 52px;
                height: 52px;
                font-size: 2rem;
                border-radius: 20px;
            }
            .game-title {
                font-size: 1.2rem;
            }
            .header h1 {
                font-size: 1.8rem;
            }
            .subhead {
                font-size: 0.85rem;
            }
            .container {
                max-width: 100%;
            }
        }

        /* 平滑滚动 */
        html {
            scroll-behavior: smooth;
        }
    </style>
</head>
<body>

    <div class="container">
        <div class="header">
            <div class="blog-badge">
                <span>Zarke博客</span> <span style="font-weight: 300;">· 导航页</span>
            </div>
        </div>

        <!-- 游戏卡片列表 -->
        <div class="games-grid" id="gamesGrid">
            <!-- 五子棋卡片 (主游戏 - 可用) -->
            <div class="game-card" data-game-key="gomoku" data-available="true" data-game-name="五子棋">
                <div class="game-icon">⚫⚪</div>
                <div class="game-info">
                    <div class="game-title">
                        五子棋
                        <span class="status available">✓ 可玩</span>
                    </div>
                </div>
            </div>

            <!-- 预留扩展1: 象棋 (即将推出) -->
            <div class="game-card" data-game-key="chinesechess" data-available="false" data-game-name="中国象棋">
                <div class="game-icon">♜♞</div>
                <div class="game-info">
                    <div class="game-title">
                        中国象棋
                        <span class="status coming">即将开放</span>
                    </div>
                </div>
            </div>
        </div>

        <div class="footer-note">
        </div>
    </div>

    <script>
        (function() {
            // ---------- 轻提示系统 (Toast) ----------
            let toastEl = null;

            function createToast() {
                if (!toastEl) {
                    toastEl = document.createElement('div');
                    toastEl.className = 'toast-notify';
                    document.body.appendChild(toastEl);
                }
                return toastEl;
            }

            function showMessage(text, duration = 1800) {
                const toast = createToast();
                toast.textContent = text;
                toast.classList.add('show');
                clearTimeout(window.toastTimeout);
                window.toastTimeout = setTimeout(() => {
                    toast.classList.remove('show');
                }, duration);
            }

            // ---------- 配置: 五子棋游戏链接 (可配置真实地址) ----------
            const GAMES_CONFIG = {
                gomoku: {
                    available: true,
                    name: '五子棋',
                    // 🎯 重点配置: 将下面的链接替换为您博客五子棋游戏的真实URL
                    link: "games/gomoku.html",
                    onClick: null
                },
                chinesechess: {
                    available: false,
                    name: '中国象棋',
                    message: '中国象棋正在开发中，敬请期待下一版本～'
                },
            };

            console.log(
                '%c[游戏导航配置] 五子棋当前为演示提示模式，您可编辑 GAMES_CONFIG.gomoku.link 设置真实游戏地址。',
                'color: #7ab8e0; font-size: 12px;'
            );

            // 获取卡片元素
            const gomokuCard = document.querySelector('.game-card[data-game-key="gomoku"]');
            const chessCard = document.querySelector('.game-card[data-game-key="chinesechess"]');
            const reversiCard = document.querySelector('.game-card[data-game-key="reversi"]');

            // 统一的卡片点击处理器
            function handleCardClick(card, gameKey) {
                if (!card) return;

                const config = GAMES_CONFIG[gameKey];
                if (!config) {
                    showMessage('✨ 游戏信息暂不可用，请稍后再试');
                    return;
                }

                // 可用游戏逻辑 (五子棋)
                if (config.available) {
                    if (config.link && typeof config.link === 'string' && config.link.trim() !== '') {
                        window.open(config.link, '_blank');
                        showMessage(`🎮 正在打开《${config.name}》，祝您游戏愉快`, 1200);
                    } else {
                        showMessage(
                            `🎲 《${config.name}》游戏入口即将开放，请在代码中配置真实链接 (编辑 GAMES_CONFIG.gomoku.link)`,
                            2500);
                        console.warn(
                            `[五子棋导航] 未检测到有效游戏链接，您可以在 JavaScript 中 GAMES_CONFIG.gomoku.link 设置实际游戏路径。\n示例: link: './gomoku.html'`
                            );
                    }
                }
                // 未开放游戏 (coming soon)
                else {
                    if (config.message) {
                        showMessage(config.message, 1800);
                    } else {
                        showMessage(`「${config.name}」敬请期待，即将到来`, 1600);
                    }
                    card.style.transform = 'scale(0.99)';
                    setTimeout(() => {
                        if (card) card.style.transform = '';
                    }, 120);
                }
            }

            // 为卡片绑定点击事件
            if (gomokuCard) {
                gomokuCard.addEventListener('click', (e) => {
                    e.stopPropagation();
                    handleCardClick(gomokuCard, 'gomoku');
                });
            }

            if (chessCard) {
                chessCard.addEventListener('click', (e) => {
                    e.stopPropagation();
                    handleCardClick(chessCard, 'chinesechess');
                });
            }

            if (reversiCard) {
                reversiCard.addEventListener('click', (e) => {
                    e.stopPropagation();
                    handleCardClick(reversiCard, 'reversi');
                });
            }

            // 增加可访问性辅助
            const cards = document.querySelectorAll('.game-card');
            cards.forEach(card => {
                card.setAttribute('role', 'button');
                card.setAttribute('tabindex', '0');
                card.addEventListener('keydown', (e) => {
                    if (e.key === 'Enter' || e.key === ' ') {
                        e.preventDefault();
                        card.click();
                    }
                });
            });

            // 预留动态修改配置的示例
            window.updateGameLink = function(gameKey, newLink) {
                if (GAMES_CONFIG[gameKey]) {
                    GAMES_CONFIG[gameKey].link = newLink;
                    if (gameKey === 'gomoku') {
                        showMessage(`✅ 五子棋链接已更新为: ${newLink}`, 1500);
                        console.log(`[导航配置] 五子棋游戏链接已设置为: ${newLink}`);
                    } else {
                        console.log(`[导航配置] ${gameKey} 链接已更新`);
                    }
                } else {
                    console.warn('未找到该游戏配置');
                }
            };

            console.log("✨ 小游戏导航已就绪 | 五子棋入口待配置链接 | 深色主题 · 设计简洁现代 · 手机适配");
        })();
    </script>
</body>
</html>
