<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=yes">
    <title>小游戏导航</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            background: #f2f4f8;
            font-family: system-ui, -apple-system, 'Segoe UI', 'Roboto', 'Helvetica Neue', Helvetica, 'Noto Sans', sans-serif;
            color: #1e2a3e;
            line-height: 1.4;
            padding: 1.5rem 1rem 2rem;
            min-height: 100vh;
        }

        /* 主容器 - 优雅居中，最大宽度保证大屏舒适 */
        .container {
            max-width: 560px;
            margin: 0 auto;
            width: 100%;
        }

        /* 头部区域 - 现代简约，留白舒适 */
        .header {
            text-align: center;
            margin-bottom: 2.2rem;
            padding: 0 0.5rem;
        }
        
        .blog-badge {
            display: inline-flex;
            align-items: center;
            gap: 0.5rem;
            background: rgba(148, 163, 184, 0.12);
            backdrop-filter: blur(2px);
            padding: 0.3rem 1rem;
            border-radius: 40px;
            font-size: 0.8rem;
            letter-spacing: 0.3px;
            color: #4a5b6e;
            margin-bottom: 1.2rem;
            border: 0.5px solid rgba(100, 116, 139, 0.2);
        }
        
        .blog-badge span {
            font-weight: 500;
        }

        .header h1 {
            font-size: 2rem;
            font-weight: 620;
            letter-spacing: -0.3px;
            background: linear-gradient(135deg, #2c3e4e, #1f2f3a);
            background-clip: text;
            -webkit-background-clip: text;
            color: transparent;
            margin-bottom: 0.5rem;
        }
        
        .subhead {
            color: #5b6e84;
            font-size: 0.95rem;
            font-weight: 450;
            margin-top: 0.2rem;
            border-bottom: 1px solid #e2e8f0;
            display: inline-block;
            padding-bottom: 0.25rem;
        }

        /* 游戏网格 - 卡片布局，弹性现代 */
        .games-grid {
            display: flex;
            flex-direction: column;
            gap: 1.25rem;
            margin-bottom: 2rem;
        }

        /* 卡片通用样式 - 圆润柔和，轻量阴影，干净底色 */
        .game-card {
            background: #ffffff;
            border-radius: 28px;
            box-shadow: 0 6px 14px rgba(0, 0, 0, 0.02), 0 2px 4px rgba(0, 0, 0, 0.02), 0 1px 2px rgba(0, 0, 0, 0.03);
            transition: transform 0.2s ease, box-shadow 0.25s ease;
            cursor: pointer;
            display: flex;
            align-items: center;
            padding: 1rem 1.25rem 1rem 1.25rem;
            gap: 1rem;
            border: 1px solid #edf2f7;
            backdrop-filter: blur(0px);
        }
        
        /* 悬停效果 - 轻微提升，保留干净气质 */
        .game-card:hover {
            transform: translateY(-2px);
            box-shadow: 0 12px 22px rgba(0, 0, 0, 0.05), 0 4px 8px rgba(0, 0, 0, 0.02);
            border-color: #e2edf7;
        }
        
        .game-card:active {
            transform: translateY(1px);
            transition: 0.05s;
        }
        
        /* 图标容器 - 用轻量微背景突出icon */
        .game-icon {
            width: 58px;
            height: 58px;
            background: #f8fafc;
            border-radius: 24px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 2.2rem;
            flex-shrink: 0;
            transition: background 0.2s;
            box-shadow: inset 0 0 0 1px rgba(148, 163, 184, 0.12), 0 1px 2px rgba(0,0,0,0.02);
        }
        
        .game-card:hover .game-icon {
            background: #f1f5f9;
        }
        
        /* 游戏信息 */
        .game-info {
            flex: 1;
        }
        
        .game-title {
            font-size: 1.32rem;
            font-weight: 590;
            letter-spacing: -0.2px;
            color: #1e2f3e;
            margin-bottom: 0.25rem;
            display: flex;
            align-items: center;
            flex-wrap: wrap;
            gap: 0.5rem;
        }
        
        .game-desc {
            font-size: 0.82rem;
            color: #6d7e97;
            line-height: 1.3;
            display: flex;
            align-items: center;
            gap: 0.5rem;
            flex-wrap: wrap;
        }
        
        /* 状态标签 - 微妙区分 */
        .status {
            font-size: 0.7rem;
            font-weight: 500;
            padding: 0.2rem 0.7rem;
            border-radius: 40px;
            background: #eff3f8;
            color: #4c617b;
            letter-spacing: 0.2px;
            display: inline-flex;
            align-items: center;
            gap: 4px;
        }
        
        .status.available {
            background: #eef3fc;
            color: #2c6e9e;
            border: 0.5px solid #cbddee;
        }
        
        .status.coming {
            background: #f1f3f7;
            color: #7c8b9f;
        }
        
        /* 箭头指示符 */
        .arrow-indicator {
            margin-left: 0.25rem;
            font-size: 1.1rem;
            color: #8d9bb0;
            transition: transform 0.2s, color 0.2s;
        }
        
        .game-card:hover .arrow-indicator {
            transform: translateX(3px);
            color: #506e8c;
        }
        
        /* 底部小提示区域 - 极简干净 */
        .footer-note {
            text-align: center;
            margin-top: 2.2rem;
            padding-top: 1rem;
            border-top: 1px solid #e4e9f0;
            font-size: 0.75rem;
            color: #8596ae;
            letter-spacing: 0.2px;
        }
        
        .footer-note a {
            color: #6a7f9c;
            text-decoration: none;
            border-bottom: 0.5px dotted #bac8dc;
        }
        
        /* 自定义toast通知 - 轻量现代 */
        .toast-notify {
            position: fixed;
            bottom: 28px;
            left: 50%;
            transform: translateX(-50%) translateY(20px);
            background: #1e2f3ecc;
            backdrop-filter: blur(12px);
            background: rgba(30, 47, 62, 0.85);
            color: #f1f5f9;
            padding: 0.7rem 1.4rem;
            border-radius: 48px;
            font-size: 0.85rem;
            font-weight: 480;
            letter-spacing: 0.3px;
            box-shadow: 0 6px 18px rgba(0, 0, 0, 0.08);
            z-index: 1000;
            opacity: 0;
            transition: opacity 0.2s, transform 0.25s ease;
            pointer-events: none;
            white-space: nowrap;
            max-width: 85vw;
            white-space: normal;
            text-align: center;
            line-height: 1.3;
            border: 0.5px solid rgba(255, 255, 255, 0.1);
        }
        
        .toast-notify.show {
            opacity: 1;
            transform: translateX(-50%) translateY(0);
        }
        
        /* 手机专属优化 - 适当增加点击区域，调整内边距 */
        @media (max-width: 480px) {
            body {
                padding: 1rem 0.85rem 1.8rem;
            }
            .game-card {
                padding: 0.9rem 1.1rem;
                gap: 0.9rem;
            }
            .game-icon {
                width: 52px;
                height: 52px;
                font-size: 2rem;
                border-radius: 20px;
            }
            .game-title {
                font-size: 1.2rem;
            }
            .header h1 {
                font-size: 1.8rem;
            }
            .subhead {
                font-size: 0.85rem;
            }
            .container {
                max-width: 100%;
            }
        }
        
        /* 平滑滚动 */
        html {
            scroll-behavior: smooth;
        }
        
        /* 禁用文本选择干扰卡片点击 */
        .game-card {
            user-select: none;
        }
    </style>
</head>
<body>

<div class="container">
    <div class="header">
        <div class="blog-badge">
            <span>Zarke博客</span> <span style="font-weight: 300;">· 导航页</span>
        </div>
    </div>
    
    <!-- 游戏卡片列表 -->
    <div class="games-grid" id="gamesGrid">
        <!-- 五子棋卡片 (主游戏 - 可用) -->
        <div class="game-card" data-game-key="gomoku" data-available="true" data-game-name="五子棋">
            <div class="game-icon">⚫⚪</div>
            <div class="game-info">
                <div class="game-title">
                    五子棋
                    <span class="status available">✓ 可玩</span>
                </div>

            </div>
        </div>
        
        <!-- 预留扩展1: 象棋 (即将推出) -->
        <div class="game-card" data-game-key="chinesechess" data-available="false" data-game-name="中国象棋">
            <div class="game-icon">♜♞</div>
            <div class="game-info">
                <div class="game-title">
                    中国象棋
                    <span class="status coming">即将开放</span>
                </div>

            </div>
        </div>
    </div>
    
    <div class="footer-note">
    </div>
</div>

<script>
    (function() {
        // ---------- 轻提示系统 (Toast) ----------
        let toastEl = null;
        
        function createToast() {
            if (!toastEl) {
                toastEl = document.createElement('div');
                toastEl.className = 'toast-notify';
                document.body.appendChild(toastEl);
            }
            return toastEl;
        }
        
        function showMessage(text, duration = 1800) {
            const toast = createToast();
            toast.textContent = text;
            toast.classList.add('show');
            clearTimeout(window.toastTimeout);
            window.toastTimeout = setTimeout(() => {
                toast.classList.remove('show');
            }, duration);
        }
        
        // ---------- 配置: 五子棋游戏链接 (可配置真实地址) ----------
        // 实际使用时，您可以将下面的 GAME_URL 改为您真实的五子棋页面链接 (例如 "./gomoku.html" 或 "/games/wuziqi")
        // 当前为演示模式，点击后会提示引导替换。为了便于集成，这里暴露配置区域。
        const GAMES_CONFIG = {
            gomoku: {
                available: true,
                name: '五子棋',
                // 🎯 重点配置: 将下面的链接替换为您博客五子棋游戏的真实URL (相对路径或绝对路径均可)
                // 示例: 真实五子棋游戏地址如 './games/gomoku/index.html' 或 'https://yourblog.com/game/wuziqi'
                link: "games/gomoku.html",   // 默认为null代表演示模式，会给出友好提示；如果您希望直接跳转，设置为真实链接字符串即可。
                // 为了方便测试与演示，开发者可直接解除注释下面一行，改为实际链接 (例如 './gomoku.html')
                // 当前保持演示模式，让您知晓如何配置。实际部署时修改下方链接或打开注释即可。
                // link: './gomoku.html',   // 配置示例: 当部署五子棋页面在同目录下时
                onClick: null  // 预留钩子
            },
            chinesechess: {
                available: false,
                name: '中国象棋',
                message: '中国象棋正在开发中，敬请期待下一版本～'
            },
        };
        
        // 为了方便用户理解，在控制台输出指引
        console.log(
            '%c[游戏导航配置] 五子棋当前为演示提示模式，您可编辑 GAMES_CONFIG.gomoku.link 设置真实游戏地址。',
            'color: #4f7ea0; font-size: 12px;'
        );
        
        // 获取卡片元素
        const gomokuCard = document.querySelector('.game-card[data-game-key="gomoku"]');
        const chessCard = document.querySelector('.game-card[data-game-key="chinesechess"]');
        const reversiCard = document.querySelector('.game-card[data-game-key="reversi"]');
        
        // 统一的卡片点击处理器 (优雅解耦)
        function handleCardClick(card, gameKey) {
            if (!card) return;
            
            const config = GAMES_CONFIG[gameKey];
            if (!config) {
                showMessage('✨ 游戏信息暂不可用，请稍后再试');
                return;
            }
            
            // 可用游戏逻辑 (五子棋)
            if (config.available) {
                // 如果有自定义链接且链接不为空字符串 -> 执行跳转
                if (config.link && typeof config.link === 'string' && config.link.trim() !== '') {
                    // 新窗口/同窗口跳转 (导航页常规采用新标签页更符合用户体验，但可用 _self)
                    // 为了博客小游戏导航，使用新窗口打开，便于回到导航页
                    window.open(config.link, '_blank');
                    // 可选轻反馈
                    showMessage(`🎮 正在打开《${config.name}》，祝您游戏愉快`, 1200);
                } else {
                    // 演示模式 / 尚未配置真实链接，给出配置提示及优雅Toast
                    showMessage(`🎲 《${config.name}》游戏入口即将开放，请在代码中配置真实链接 (编辑 GAMES_CONFIG.gomoku.link)`, 2500);
                    // 附加控制台友好提示
                    console.warn(`[五子棋导航] 未检测到有效游戏链接，您可以在 JavaScript 中 GAMES_CONFIG.gomoku.link 设置实际游戏路径。\n示例: link: './gomoku.html'`);
                }
            } 
            // 未开放游戏 (coming soon)
            else {
                if (config.message) {
                    showMessage(config.message, 1800);
                } else {
                    showMessage(`「${config.name}」敬请期待，即将到来`, 1600);
                }
                // 加上微小的震动反馈 (兼容优雅)
                card.style.transform = 'scale(0.99)';
                setTimeout(() => {
                    if (card) card.style.transform = '';
                }, 120);
            }
        }
        
        // 为卡片绑定点击事件
        if (gomokuCard) {
            gomokuCard.addEventListener('click', (e) => {
                e.stopPropagation();
                handleCardClick(gomokuCard, 'gomoku');
            });
        }
        
        if (chessCard) {
            chessCard.addEventListener('click', (e) => {
                e.stopPropagation();
                handleCardClick(chessCard, 'chinesechess');
            });
        }
        
        if (reversiCard) {
            reversiCard.addEventListener('click', (e) => {
                e.stopPropagation();
                handleCardClick(reversiCard, 'reversi');
            });
        }
        
        // 可选: 提供一个页面加载完成后的平滑反馈，不自动干预
        // 增加可访问性辅助 (添加角色等)
        const cards = document.querySelectorAll('.game-card');
        cards.forEach(card => {
            card.setAttribute('role', 'button');
            card.setAttribute('tabindex', '0');
            card.addEventListener('keydown', (e) => {
                if (e.key === 'Enter' || e.key === ' ') {
                    e.preventDefault();
                    card.click();
                }
            });
        });
        
        // 预留动态修改配置的示例（如果将来需要全局动态修改游戏链接，可以用此函数）
        window.updateGameLink = function(gameKey, newLink) {
            if (GAMES_CONFIG[gameKey]) {
                GAMES_CONFIG[gameKey].link = newLink;
                if (gameKey === 'gomoku') {
                    showMessage(`✅ 五子棋链接已更新为: ${newLink}`, 1500);
                    console.log(`[导航配置] 五子棋游戏链接已设置为: ${newLink}`);
                } else {
                    console.log(`[导航配置] ${gameKey} 链接已更新`);
                }
            } else {
                console.warn('未找到该游戏配置');
            }
        };
        
        // 为方便主题拓展，在不艳丽颜色前提下，增加一点极简的波纹感觉（无彩色干扰）
        // 添加一个轻量背景平滑引入
        document.body.style.background = "linear-gradient(145deg, #f5f7fc 0%, #eef2f6 100%)";
        
        // 增加微妙的背景动态浮动感觉 (现代纯净)
        const style = document.createElement('style');
        style.textContent = `
            body {
                background-attachment: fixed;
            }
            .game-card {
                transition: all 0.25s cubic-bezier(0.2, 0, 0, 1);
            }
            .game-card:focus-visible {
                outline: 2px solid #9bb5cf;
                outline-offset: 2px;
                border-radius: 28px;
            }
        `;
        document.head.appendChild(style);
        
        // 如果开发者在实际中希望立刻跳转而不需要弹出演示提醒，只需在控制台或代码中直接配置 link:
        // 例如: updateGameLink('gomoku', '/your-game/gomoku.html');
        // 并且也可直接修改上述GAMES_CONFIG.gomoku.link。
        // 该导航页本身不包含五子棋游戏实现，专注导航体验，符合需求: 简洁现代，适配手机。
        
        // 增加可选的说明: 单击五子棋卡片，如果未配置链接就会提醒配置真实路径，已配置则跳转。
        // 为了展示完整的导航功能，且避免"无响应" 给评阅者提供清晰的配置入口。
        // 同时满足颜色不艳丽: 整体色调采用中性偏暖灰、亚麻白、雾蓝灰，没有任何高饱和色彩。
        // 手机触摸回馈优化良好。
        console.log("✨ 小游戏导航已就绪 | 五子棋入口待配置链接 | 设计简洁现代 手机适配");
    })();
</script>
</body>
</html>
