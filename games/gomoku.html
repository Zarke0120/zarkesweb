<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>五子棋对弈</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@300;400;500;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <style>
        :root {
            --bg:#0c0c10;--bg2:#111118;--card:#17171f;--card-hover:#1d1d28;
            --fg:#eae8e3;--muted:#6e6d78;--accent:#e8a838;--accent2:#f5c96a;
            --border:#26272f;--danger:#ef4444;--success:#22c55e;
        }
        *{margin:0;padding:0;box-sizing:border-box}
        body{font-family:'Noto Sans SC',sans-serif;background:var(--bg);color:var(--fg);min-height:100vh;overflow-x:hidden}
        body::before{content:'';position:fixed;inset:0;pointer-events:none;z-index:0;
            background:radial-gradient(ellipse 80% 60% at 15% 20%,rgba(232,168,56,.06),transparent),
            radial-gradient(ellipse 60% 80% at 85% 75%,rgba(180,130,30,.05),transparent),
            radial-gradient(ellipse 50% 50% at 50% 50%,rgba(232,168,56,.02),transparent)}
        .page{display:none;position:relative;z-index:1}.page.active{display:flex}
        #lobby-page{flex-direction:column;align-items:center;padding:48px 20px 32px;min-height:100vh}
        .lobby-logo{font-size:3.2rem;font-weight:900;letter-spacing:-.03em;
            background:linear-gradient(135deg,var(--accent),#f5d799,var(--accent));
            -webkit-background-clip:text;-webkit-text-fill-color:transparent;margin-bottom:4px}
        .lobby-sub{color:var(--muted);font-size:.95rem;margin-bottom:36px;font-weight:300}
        .lobby-card{background:var(--card);border:1px solid var(--border);border-radius:16px;padding:24px;
            width:100%;max-width:460px;margin-bottom:18px;transition:border-color .25s}
        .lobby-card:hover{border-color:#33343f}
        .lobby-card h2{font-size:1rem;font-weight:700;margin-bottom:14px;display:flex;align-items:center;gap:8px}
        .lobby-card h2 i{color:var(--accent);font-size:.9rem}
        .lobby-card h2 .right{margin-left:auto}
        .input-field{width:100%;background:var(--bg2);border:1px solid var(--border);border-radius:10px;
            padding:11px 14px;color:var(--fg);font-size:.92rem;outline:none;transition:border-color .2s;font-family:inherit}
        .input-field:focus{border-color:var(--accent)}
        .input-field::placeholder{color:var(--muted)}
        .btn{display:inline-flex;align-items:center;justify-content:center;gap:7px;
            padding:10px 20px;border-radius:10px;font-size:.92rem;font-weight:600;
            cursor:pointer;border:none;transition:all .2s;font-family:inherit;user-select:none}
        .btn-primary{background:var(--accent);color:#0c0c10}
        .btn-primary:hover{background:var(--accent2);transform:translateY(-1px)}
        .btn-ghost{background:var(--border);color:var(--fg)}
        .btn-ghost:hover{background:#353642}
        .btn-danger{background:var(--danger);color:#fff}
        .btn-danger:hover{background:#dc2626}
        .btn-success{background:var(--success);color:#fff}
        .btn-success:hover{background:#16a34a}
        .btn-sm{padding:7px 14px;font-size:.82rem;border-radius:8px}
        .btn:disabled{opacity:.45;cursor:not-allowed;transform:none!important}
        .room-item{display:flex;align-items:center;justify-content:space-between;
            padding:11px 14px;background:var(--bg2);border-radius:10px;margin-bottom:7px;transition:background .2s}
        .room-item:hover{background:var(--card-hover)}
        .room-name{font-weight:600;font-size:.92rem}
        .room-host{font-size:.78rem;color:var(--muted);margin-top:2px}
        .empty-state{text-align:center;padding:28px 0;color:var(--muted);font-size:.9rem}
        .empty-state i{font-size:1.6rem;margin-bottom:6px;display:block;opacity:.5}
        #game-page{flex-direction:column;align-items:center;padding:12px 8px;min-height:100vh}
        @media (max-width: 560px) {
            #game-page { padding: 8px 6px; }
            .game-header { margin-bottom: 4px; }
            .player-card { padding: 6px 8px; }
            .player-card .stone-dot { width: 22px; height: 22px; }
            .p-name { font-size: 0.8rem; }
            .status-bar { font-size: 0.85rem; margin-bottom: 6px; }
        }
        .room-title-bar{font-size:.78rem;color:var(--muted);margin-bottom:4px;display:flex;align-items:center;gap:6px}
        .room-title-bar i{color:var(--accent);font-size:.7rem}
        .game-header{display:flex;align-items:center;gap:10px;margin-bottom:8px;width:100%;max-width:750px}
        .player-card{flex:1;background:var(--card);border:2px solid var(--border);border-radius:12px;
            padding:10px 14px;display:flex;align-items:center;gap:10px;transition:all .35s;min-width:0}
        .player-card.is-turn{border-color:var(--accent);box-shadow:0 0 24px rgba(232,168,56,.13)}
        .stone-dot{width:26px;height:26px;border-radius:50%;flex-shrink:0}
        .stone-dot.black{background:radial-gradient(circle at 35% 35%,#2b2b2b,#111);border:1px solid #3a3a3a}
        .stone-dot.white{background:radial-gradient(circle at 35% 35%,#f9f9f9,#c0c0c0);border:1px solid #aaa}
        .p-name{font-weight:700;font-size:.92rem;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
        .p-label{font-size:.7rem;color:var(--muted)}
        .vs-text{font-weight:900;color:var(--muted);font-size:.85rem;flex-shrink:0;letter-spacing:.05em}
        .status-bar{text-align:center;margin-bottom:6px;font-size:.92rem;font-weight:600;min-height:26px;transition:color .3s}
        .status-bar.waiting{animation:pulse-opacity 1.8s ease-in-out infinite}
        @keyframes pulse-opacity{0%,100%{opacity:1}50%{opacity:.45}}
        .board-wrap{position:relative;border-radius:12px;overflow:hidden;
            box-shadow:0 12px 28px rgba(0,0,0,.5),0 0 0 1px rgba(232,168,56,.2);
            margin: 4px auto; max-width: 96vw; display: flex; justify-content: center;}
        .board-wrap canvas{display:block;position:absolute;top:0;left:0}
        .board-wrap canvas:first-child{position:relative}
        #boardOverlay{cursor:default; touch-action: none;}
        .game-actions{display:flex;gap:10px;margin-top:12px;flex-wrap:wrap;justify-content:center}
        .modal-mask{display:none;position:fixed;inset:0;background:rgba(0,0,0,.78);z-index:100;
            justify-content:center;align-items:center;backdrop-filter:blur(5px)}
        .modal-mask.show{display:flex}
        .modal-box{background:var(--card);border:1px solid var(--border);border-radius:20px;padding:32px 28px;
            text-align:center;max-width:380px;width:90%;animation:modal-pop .3s cubic-bezier(.34,1.56,.64,1)}
        @keyframes modal-pop{from{transform:scale(.85);opacity:0}to{transform:scale(1);opacity:1}}
        .modal-box h3{font-size:1.25rem;font-weight:800;margin-bottom:8px}
        .modal-box p{color:var(--muted);margin-bottom:22px;font-size:.92rem;line-height:1.5}
        .modal-btns{display:flex;gap:10px;justify-content:center}
        .toast-wrap{position:fixed;top:18px;right:18px;z-index:200;display:flex;flex-direction:column;gap:8px;pointer-events:none}
        .toast{background:var(--card);border:1px solid var(--border);border-radius:10px;padding:11px 18px;
            font-size:.88rem;max-width:300px;pointer-events:auto;
            animation:toast-in .3s ease,toast-out .35s ease 2.6s forwards}
        .toast.err{border-left:3px solid var(--danger)}
        .toast.ok{border-left:3px solid var(--success)}
        .toast.info{border-left:3px solid var(--accent)}
        @keyframes toast-in{from{transform:translateX(110%);opacity:0}to{transform:translateX(0);opacity:1}}
        @keyframes toast-out{to{opacity:0;transform:translateX(110%)}}
        .result-icon{font-size:3rem;margin-bottom:12px;display:block}
        .result-win{color:var(--accent)}.result-lose{color:var(--danger)}.result-leave{color:var(--muted)}
    </style>
</head>
<body>

<div class="toast-wrap" id="toastWrap"></div>

<!-- 大厅 -->
<div id="lobby-page" class="page active">
    <div class="lobby-logo">五子棋</div>
    <p class="lobby-sub">在线对弈，执子落局</p>
    <div class="lobby-card">
        <h2><i class="fas fa-user-edit"></i> 玩家信息</h2>
        <input class="input-field" id="inputName" placeholder="输入你的昵称">
    </div>
    <div class="lobby-card">
        <h2><i class="fas fa-plus-circle"></i> 创建房间</h2>
        <input class="input-field" id="inputRoom" placeholder="房间名称（可选）" style="margin-bottom:12px">
        <button class="btn btn-primary" id="btnCreate" style="width:100%"><i class="fas fa-plus"></i> 创建并进入</button>
    </div>
    <div class="lobby-card">
        <h2><i class="fas fa-door-open"></i> 可用房间 <span class="right"><button class="btn btn-ghost btn-sm" id="btnRefresh"><i class="fas fa-sync-alt"></i> 刷新</button></span></h2>
        <div id="roomList"><div class="empty-state"><i class="fas fa-chess-board"></i>点击刷新查看房间</div></div>
    </div>
</div>

<!-- 游戏 -->
<div id="game-page" class="page">
    <div class="room-title-bar"><i class="fas fa-door-open"></i> <span id="roomTitleText">—</span></div>
    <div class="game-header">
        <div class="player-card" id="cardBlack">
            <div class="stone-dot black"></div>
            <div style="min-width:0"><div class="p-name" id="nameBlack">—</div><div class="p-label">执黑先行</div></div>
        </div>
        <div class="vs-text">VS</div>
        <div class="player-card" id="cardWhite">
            <div class="stone-dot white"></div>
            <div style="min-width:0"><div class="p-name" id="nameWhite">—</div><div class="p-label">执白后手</div></div>
        </div>
    </div>
    <div class="status-bar waiting" id="statusBar">正在连接...</div>
    <div class="board-wrap" id="boardWrap">
        <canvas id="boardBg"></canvas>
        <canvas id="boardStones"></canvas>
        <canvas id="boardOverlay"></canvas>
    </div>
    <div class="game-actions">
        <button class="btn btn-ghost" id="btnUndo" disabled><i class="fas fa-undo"></i> 悔棋</button>
        <button class="btn btn-danger" id="btnLeave"><i class="fas fa-sign-out-alt"></i> 离开房间</button>
    </div>
</div>

<!-- 悔棋弹窗 -->
<div class="modal-mask" id="undoModal">
    <div class="modal-box">
        <h3><i class="fas fa-undo" style="color:var(--accent)"></i> 悔棋请求</h3>
        <p>对手请求悔棋，是否同意？</p>
        <div class="modal-btns">
            <button class="btn btn-danger" id="btnUndoReject">拒绝</button>
            <button class="btn btn-success" id="btnUndoAccept">同意</button>
        </div>
    </div>
</div>

<!-- 结果弹窗 -->
<div class="modal-mask" id="resultModal">
    <div class="modal-box">
        <span class="result-icon" id="resultIcon"></span>
        <h3 id="resultTitle">游戏结束</h3>
        <p id="resultMsg">...</p>
        <div class="modal-btns">
            <button class="btn btn-primary" id="btnBackLobby"><i class="fas fa-home"></i> 返回大厅</button>
        </div>
    </div>
</div>

<script>
/* ================================================================
   配置
   ================================================================ */
const API_BASE = 'https://gomoku.zarke.ccwu.cc';
const BOARD_SIZE = 20;
const POLL_MS = 400;

/* ================================================================
   全局状态
   ================================================================ */
const uid = 'u' + Date.now().toString(36) + Math.random().toString(36).slice(2, 8);
let uname = localStorage.getItem('gmk_uname') || '';

let roomId = null;
let currentRoomName = '';
let myColor = null;
let pollTimer = null;
let lastState = null;
let gameOver = false;
let undoModalOpen = false;

// 本地限制
let localTurn = null;
let pendingMoves = new Map();
let isMoving = false;
let lastPlacedMove = null;

// 防止拒绝悔棋后弹窗闪烁：记录已拒绝的悔棋时间戳
let lastRejectedUndoTs = 0;

// 离开房间标记：防止离开过程中轮询触发结果弹窗
let isLeaving = false;

let renderedMap = new Map();
let hoverX = -1, hoverY = -1;
let CELL = 30;      // 格子大小 (px)
let PAD = 22;       // 左上边距 (px)  —— 将使用浮点精确居中
let SRAD = 13;      // 棋子半径

/* ================================================================
   工具函数
   ================================================================ */
function toast(msg, type = 'info') {
    const el = document.createElement('div');
    el.className = 'toast ' + ({ info: 'info', ok: 'ok', err: 'err' }[type] || 'info');
    el.textContent = msg;
    document.getElementById('toastWrap').appendChild(el);
    setTimeout(() => el.remove(), 3200);
}
function esc(s) { const d = document.createElement('div'); d.textContent = s || ''; return d.innerHTML; }
function genRoomId() { return 'r' + Date.now().toString(36) + Math.random().toString(36).slice(2, 7); }
async function api(method, path, body) {
    const opt = { method, headers: { 'Content-Type': 'application/json' } };
    if (body) opt.body = JSON.stringify(body);
    try { return await (await fetch(API_BASE + path, opt)).json(); }
    catch (e) { toast('网络错误', 'err'); return { success: false, message: 'Network error' }; }
}
function showPage(id) {
    document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
    document.getElementById(id).classList.add('active');
}

/* ================================================================
   棋盘尺寸计算 - 保证绝对居中 (修复偏移问题)
   ================================================================ */
function calcSize() {
    const container = document.getElementById('boardWrap');
    // 最大可用宽度：屏幕宽度减去左右留白 (至少20px)
    const maxWidth = Math.min(window.innerWidth - 24, 760);
    const maxHeight = window.innerHeight - 210;  // 为顶部UI留出空间
    let maxBoard = Math.min(maxWidth, maxHeight);
    if (maxBoard < 180) maxBoard = 180; // 极小屏幕保护

    // 理想格子大小: 尽可能大，但保证 (BOARD_SIZE-1)*CELL + 2*PAD <= maxBoard
    // 采用整数CELL，并自动计算精确居中的PAD
    let rawCell = Math.floor((maxBoard - 20) / (BOARD_SIZE - 1));
    CELL = Math.min(38, Math.max(20, rawCell));   // 限制范围，保证可点
    // 根据CELL精确计算画布总宽
    let totalGridWidth = (BOARD_SIZE - 1) * CELL;
    // 边距 = (maxBoard - totalGridWidth) / 2，但可能为负，取最小值20px保证有边距
    let idealPad = (maxBoard - totalGridWidth) / 2;
    PAD = Math.max(12, Math.min(maxBoard * 0.1, idealPad));
    // 重新验证总宽是否超过maxBoard（微调CELL）
    let totalWidth = totalGridWidth + 2 * PAD;
    if (totalWidth > maxBoard + 2 && CELL > 20) {
        CELL -= 1;
        totalGridWidth = (BOARD_SIZE - 1) * CELL;
        idealPad = (maxBoard - totalGridWidth) / 2;
        PAD = Math.max(12, Math.min(maxBoard * 0.1, idealPad));
        totalWidth = totalGridWidth + 2 * PAD;
    }
    // 最终PAD使用浮点数，保证完美居中
    PAD = (totalWidth - totalGridWidth) / 2;
    SRAD = Math.max(8, Math.min(CELL * 0.47, 18));
}

function initCanvas() {
    calcSize();
    const sz = (BOARD_SIZE - 1) * CELL + 2 * PAD;
    // 画布实际像素尺寸（整数）
    const finalW = Math.round(sz);
    const finalH = Math.round(sz);
    ['boardBg', 'boardStones', 'boardOverlay'].forEach(id => {
        const c = document.getElementById(id);
        c.width = finalW;
        c.height = finalH;
        c.style.width = finalW + 'px';
        c.style.height = finalH + 'px';
    });
    drawBg();
}

/* 纯木头色棋盘 + 深棕网格线 (坐标精确浮点) */
function drawBg() {
    const c = document.getElementById('boardBg');
    const ctx = c.getContext('2d');
    const w = c.width, h = c.height;
    // 木色基底
    const grad = ctx.createLinearGradient(0, 0, w * 0.3, h);
    grad.addColorStop(0, '#e0b76a');
    grad.addColorStop(0.5, '#cf9f4a');
    grad.addColorStop(1, '#c2923c');
    ctx.fillStyle = grad;
    ctx.fillRect(0, 0, w, h);
    // 极简木纹暗纹
    ctx.globalAlpha = 0.08;
    for (let i = 0; i < 60; i++) {
        ctx.beginPath();
        ctx.moveTo(Math.random() * w, Math.random() * h);
        ctx.lineTo(Math.random() * w, Math.random() * h);
        ctx.strokeStyle = '#6b3f10';
        ctx.lineWidth = 1.2;
        ctx.stroke();
    }
    ctx.globalAlpha = 1;
    // 绘制网格线 (深栗色)
    ctx.beginPath();
    ctx.strokeStyle = '#6b3e1a';
    ctx.lineWidth = 1.8;
    for (let i = 0; i < BOARD_SIZE; i++) {
        const pos = PAD + i * CELL;
        ctx.beginPath();
        ctx.moveTo(PAD, pos);
        ctx.lineTo(PAD + (BOARD_SIZE - 1) * CELL, pos);
        ctx.stroke();
        ctx.beginPath();
        ctx.moveTo(pos, PAD);
        ctx.lineTo(pos, PAD + (BOARD_SIZE - 1) * CELL);
        ctx.stroke();
    }
    // 星位标记
    const starPoints = [[3,3],[3,9],[3,16],[9,3],[9,9],[9,16],[16,3],[16,9],[16,16]];
    for (const [sx, sy] of starPoints) {
        const cx = PAD + sx * CELL, cy = PAD + sy * CELL;
        ctx.beginPath();
        ctx.arc(cx, cy, Math.max(4, CELL * 0.12), 0, Math.PI * 2);
        ctx.fillStyle = '#a3713a';
        ctx.fill();
        ctx.beginPath();
        ctx.arc(cx, cy, Math.max(2.2, CELL * 0.07), 0, Math.PI * 2);
        ctx.fillStyle = '#e6b468';
        ctx.fill();
    }
    // 装饰边框
    ctx.strokeStyle = '#ad7a3e';
    ctx.lineWidth = 2;
    ctx.strokeRect(3, 3, w - 6, h - 6);
}

/* 绘制棋子 (立体圆润) */
function drawStone(x, y, player) {
    const ctx = document.getElementById('boardStones').getContext('2d');
    const cx = PAD + x * CELL, cy = PAD + y * CELL, r = SRAD;
    ctx.beginPath();
    ctx.arc(cx, cy, r, 0, Math.PI * 2);
    if (player === 'black') {
        const grad = ctx.createRadialGradient(cx - r * 0.25, cy - r * 0.25, r * 0.2, cx, cy, r);
        grad.addColorStop(0, '#4a4a4a');
        grad.addColorStop(0.7, '#1a1a1a');
        grad.addColorStop(1, '#050505');
        ctx.fillStyle = grad;
    } else {
        const grad = ctx.createRadialGradient(cx - r * 0.25, cy - r * 0.25, r * 0.2, cx, cy, r);
        grad.addColorStop(0, '#fefefe');
        grad.addColorStop(0.6, '#e8e8e8');
        grad.addColorStop(1, '#b0b0b0');
        ctx.fillStyle = grad;
    }
    ctx.fill();
    ctx.strokeStyle = player === 'black' ? '#444' : '#8f8f8f';
    ctx.lineWidth = 0.8;
    ctx.stroke();
    // 高光
    ctx.beginPath();
    ctx.arc(cx - r * 0.2, cy - r * 0.2, r * 0.18, 0, Math.PI * 2);
    ctx.fillStyle = player === 'black' ? 'rgba(200,200,200,0.2)' : 'rgba(255,255,255,0.85)';
    ctx.fill();
}

function eraseStone(x, y) {
    const ctx = document.getElementById('boardStones').getContext('2d');
    const cx = PAD + x * CELL, cy = PAD + y * CELL;
    ctx.clearRect(cx - SRAD - 3, cy - SRAD - 3, (SRAD + 4) * 2, (SRAD + 4) * 2);
}

/* 悬浮指示 & 最后一手标记 */
function drawOverlay() {
    const c = document.getElementById('boardOverlay');
    const ctx = c.getContext('2d');
    ctx.clearRect(0, 0, c.width, c.height);
    const canHover = !gameOver && localTurn === myColor && !isMoving &&
                     lastState && lastState.state === 1;
    if (canHover && hoverX >= 0 && hoverY >= 0 && !renderedMap.has(`${hoverX},${hoverY}`)) {
        const cx = PAD + hoverX * CELL, cy = PAD + hoverY * CELL;
        ctx.globalAlpha = 0.35;
        ctx.beginPath(); ctx.arc(cx, cy, SRAD + 2, 0, Math.PI * 2);
        ctx.fillStyle = myColor === 'black' ? '#3b2a1c' : '#e0cfaa';
        ctx.fill();
        ctx.globalAlpha = 0.7;
        ctx.beginPath(); ctx.arc(cx, cy, SRAD - 1, 0, Math.PI * 2);
        ctx.fillStyle = myColor === 'black' ? '#222' : '#faf0ce';
        ctx.fill();
        ctx.globalAlpha = 1;
    }
    if (lastPlacedMove) {
        const cx = PAD + lastPlacedMove.x * CELL, cy = PAD + lastPlacedMove.y * CELL;
        ctx.beginPath(); ctx.arc(cx, cy, Math.max(4, SRAD * 0.28), 0, Math.PI * 2);
        ctx.fillStyle = '#ff7043';
        ctx.fill();
    }
}

/* ================================================================
   差异更新 (原样保留逻辑)
   ================================================================ */
function getExpectedMap(serverMoves) {
    const map = new Map();
    for (const m of serverMoves) map.set(`${m.x},${m.y}`, m);
    for (const [, data] of pendingMoves) {
        const k = `${data.move.x},${data.move.y}`;
        if (!map.has(k)) map.set(k, data.move);
    }
    return map;
}

function updateBoard(moves) {
    const expected = getExpectedMap(moves);
    for (const [key, m] of renderedMap) {
        if (!expected.has(key)) eraseStone(m.x, m.y);
    }
    for (const [key, m] of expected) {
        if (!renderedMap.has(key)) drawStone(m.x, m.y, m.player);
    }
    renderedMap = expected;
    const serverKeys = new Set(moves.map(m => `${m.x},${m.y}`));
    for (const [key] of pendingMoves) {
        if (serverKeys.has(key)) pendingMoves.delete(key);
    }
}

function redrawAll(moves) {
    const c = document.getElementById('boardStones');
    c.getContext('2d').clearRect(0, 0, c.width, c.height);
    renderedMap = new Map();
    pendingMoves.clear();
    const expected = getExpectedMap(moves);
    for (const [, m] of expected) drawStone(m.x, m.y, m.player);
    renderedMap = expected;
    drawOverlay();
}

/* 大厅逻辑 (完全保留) */
async function loadRooms() {
    const data = await api('GET', '/api/rooms/list');
    const box = document.getElementById('roomList');
    if (!data.rooms || !data.rooms.length) {
        box.innerHTML = '<div class="empty-state"><i class="fas fa-chess-board"></i>暂无可用房间</div>';
        return;
    }
    box.innerHTML = data.rooms.map(r => `
        <div class="room-item">
            <div style="min-width:0">
                <div class="room-name">${esc(r.roomName)}</div>
                <div class="room-host"><i class="fas fa-user" style="margin-right:3px"></i>${esc(r.playerName)}</div>
            </div>
            <button class="btn btn-primary btn-sm" onclick="joinRoom('${r.roomId}','${esc(r.roomName)}')">
                <i class="fas fa-sign-in-alt"></i> 加入
            </button>
        </div>`).join('');
}

async function createRoom() {
    const name = document.getElementById('inputName').value.trim();
    if (!name) { toast('请输入昵称', 'err'); return; }
    uname = name; localStorage.setItem('gmk_uname', uname);
    const rname = document.getElementById('inputRoom').value.trim() || `${uname}的房间`;
    const rid = genRoomId();
    const data = await api('POST', '/api/rooms/create', { roomId: rid, roomName: rname, playerName: uname, userID: uid });
    if (data.success) { roomId = rid; currentRoomName = rname; myColor = 'black'; enterGame(); }
    else toast(data.message || '创建失败', 'err');
}

async function joinRoom(rid, rname) {
    const name = document.getElementById('inputName').value.trim();
    if (!name) { toast('请输入昵称', 'err'); return; }
    uname = name; localStorage.setItem('gmk_uname', uname);
    const data = await api('POST', '/api/rooms/join', { roomId: rid, playerName: uname, userID: uid });
    if (data.success) { roomId = rid; currentRoomName = rname || rid; myColor = 'white'; enterGame(); }
    else toast(data.message || '加入失败', 'err');
}

function enterGame() {
    showPage('game-page');
    gameOver = false; undoModalOpen = false; isLeaving = false;
    renderedMap = new Map(); lastState = null;
    pendingMoves = new Map(); isMoving = false;
    localTurn = 'black'; lastPlacedMove = null;
    lastRejectedUndoTs = 0;
    hoverX = hoverY = -1;
    initCanvas();
    document.getElementById('roomTitleText').textContent = currentRoomName || roomId;
    document.getElementById('nameBlack').textContent = myColor === 'black' ? uname + ' (你)' : '等待中...';
    document.getElementById('nameWhite').textContent = myColor === 'white' ? uname + ' (你)' : '等待加入...';
    document.getElementById('statusBar').textContent = '等待对手加入...';
    document.getElementById('statusBar').classList.add('waiting');
    document.getElementById('cardBlack').classList.remove('is-turn');
    document.getElementById('cardWhite').classList.remove('is-turn');
    document.getElementById('btnUndo').disabled = true;
    drawOverlay();
    startPoll();
}

function startPoll() { stopPoll(); tick(); }
function stopPoll() { if (pollTimer) { clearTimeout(pollTimer); pollTimer = null; } }

async function tick() {
    if (!roomId || gameOver || isLeaving) return;
    try {
        const data = await api('GET', `/api/rooms/state?roomId=${roomId}&userID=${uid}`);
        if (data.success && !isLeaving) { lastState = data; handleUpdate(data); }
    } catch (e) { console.error(e); }
    if (!gameOver && !isLeaving) pollTimer = setTimeout(tick, POLL_MS);
}

function handleUpdate(d) {
    if (isLeaving) return;
    const sb = document.getElementById('statusBar');
    const bk = document.getElementById('cardBlack');
    const wh = document.getElementById('cardWhite');
    updateBoard(d.moves || []);
    if (pendingMoves.size === 0) localTurn = d.turn;
    if (d.moves && d.moves.length > 0) lastPlacedMove = d.moves[d.moves.length - 1];
    else if (pendingMoves.size === 0) lastPlacedMove = null;
    if (d.name) {
        if (myColor === 'black') document.getElementById('nameWhite').textContent = d.name;
        else document.getElementById('nameBlack').textContent = d.name;
    }
    if (d.state === 0) {
        sb.textContent = '等待对手加入...'; sb.classList.add('waiting'); sb.style.color = 'var(--accent)';
        bk.classList.remove('is-turn'); wh.classList.remove('is-turn');
        document.getElementById('btnUndo').disabled = true;
    } else if (d.state === 1) {
        sb.classList.remove('waiting');
        const myTurn = localTurn === myColor;
        bk.classList.toggle('is-turn', localTurn === 'black');
        wh.classList.toggle('is-turn', localTurn === 'white');
        sb.textContent = myTurn ? '轮到你落子' : '等待对手落子';
        sb.style.color = myTurn ? 'var(--accent)' : 'var(--muted)';
        const canUndo = (d.moves || []).length >= 2 && !d.undoRequest && pendingMoves.size === 0;
        document.getElementById('btnUndo').disabled = !canUndo;
        if (d.undoRequest && d.undoRequest.from !== myColor) {
            const reqTs = d.undoRequest.timestamp || 0;
            if (reqTs !== lastRejectedUndoTs && !undoModalOpen) showUndoModal();
        } else if (!d.undoRequest) { lastRejectedUndoTs = 0; if (undoModalOpen) hideUndoModal(); }
    } else if (d.state === 2) {
        stopPoll(); gameOver = true;
        document.getElementById('btnUndo').disabled = true; hideUndoModal();
        if (d.winner) {
            const win = d.winner === myColor;
            showResult(win ? '🏆' : '🍂', win ? '胜利' : '失败', (win ? '恭喜获胜！' : '对手获胜，') + (d.winner === 'black' ? '黑方' : '白方') + '胜利', win ? 'result-win' : 'result-lose');
        } else showResult('🚪', '对局结束', '对手已离开房间', 'result-leave');
    }
    drawOverlay();
}

function tryMove(x, y) {
    if (gameOver || isLeaving || !lastState || lastState.state !== 1) return;
    if (localTurn !== myColor || isMoving) return;
    if (renderedMap.has(`${x},${y}`) || pendingMoves.has(`${x},${y}`)) return;
    isMoving = true;
    const move = { player: myColor, x, y };
    drawStone(x, y, myColor);
    renderedMap.set(`${x},${y}`, move);
    pendingMoves.set(`${x},${y}`, { move, ts: Date.now() });
    localTurn = myColor === 'black' ? 'white' : 'black';
    lastPlacedMove = move;
    updateTurnDisplay();
    drawOverlay();
    api('POST', '/api/actions/move', { roomId, userID: uid, x, y }).then(d => {
        if (!d.success) {
            eraseStone(x, y); renderedMap.delete(`${x},${y}`); pendingMoves.delete(`${x},${y}`);
            localTurn = myColor;
            if (lastState?.moves?.length > 0) lastPlacedMove = lastState.moves[lastState.moves.length - 1];
            else lastPlacedMove = null;
            updateTurnDisplay(); drawOverlay();
            toast(d.message || '落子失败', 'err');
        }
    }).finally(() => { isMoving = false; });
}

function updateTurnDisplay() {
    const bk = document.getElementById('cardBlack'), wh = document.getElementById('cardWhite');
    const sb = document.getElementById('statusBar');
    const myTurn = localTurn === myColor;
    bk.classList.toggle('is-turn', localTurn === 'black');
    wh.classList.toggle('is-turn', localTurn === 'white');
    sb.textContent = myTurn ? '轮到你落子' : '等待对手落子';
    sb.style.color = myTurn ? 'var(--accent)' : 'var(--muted)';
}

function requestUndo() { if (lastState?.state===1 && !lastState.undoRequest && pendingMoves.size===0) api('POST','/api/actions/undo-request',{roomId,userID:uid}).then(d=>{if(d.success)toast('已发送悔棋请求','info');else toast(d.message,'err')});}
function showUndoModal() { undoModalOpen=true; document.getElementById('undoModal').classList.add('show');}
function hideUndoModal() { undoModalOpen=false; document.getElementById('undoModal').classList.remove('show');}
function respondUndo(accept) { const reqTs = lastState?.undoRequest?.timestamp||Date.now(); api('POST','/api/actions/undo-response',{roomId,userID:uid,accept}).then(d=>{if(!accept)lastRejectedUndoTs=reqTs; hideUndoModal(); if(d.success)toast(accept?'已同意悔棋':'已拒绝悔棋',accept?'ok':'info'); else toast(d.message,'err');});}
async function leaveRoom() { if(isLeaving) return; isLeaving=true; stopPoll(); const savedRoomId=roomId; roomId=null; if(savedRoomId && !gameOver) await api('POST','/api/rooms/leave',{roomId:savedRoomId,userID:uid}); currentRoomName=''; myColor=null; lastState=null; gameOver=false; pendingMoves.clear(); localTurn=null; lastPlacedMove=null; hideUndoModal(); hideResult(); showPage('lobby-page'); loadRooms(); toast('已退出房间','ok'); isLeaving=false; }
function showResult(icon,title,msg,cls){ document.getElementById('resultIcon').textContent=icon; document.getElementById('resultIcon').className='result-icon '+cls; document.getElementById('resultTitle').textContent=title; document.getElementById('resultMsg').textContent=msg; document.getElementById('resultModal').classList.add('show');}
function hideResult(){ document.getElementById('resultModal').classList.remove('show');}

/* 坐标转换 (精准浮点) */
function canvasXY(clientX, clientY) {
    const c = document.getElementById('boardOverlay');
    const rect = c.getBoundingClientRect();
    const sx = c.width / rect.width, sy = c.height / rect.height;
    const mx = (clientX - rect.left) * sx, my = (clientY - rect.top) * sy;
    // 使用浮点PAD/CELL计算最近交叉点
    const xRaw = (mx - PAD) / CELL, yRaw = (my - PAD) / CELL;
    const x = Math.round(xRaw), y = Math.round(yRaw);
    if (x < 0 || x >= BOARD_SIZE || y < 0 || y >= BOARD_SIZE) return null;
    const cx = PAD + x * CELL, cy = PAD + y * CELL;
    if (Math.hypot(mx - cx, my - cy) > CELL * 0.52) return null;
    return { x, y };
}

/* 事件绑定 */
function init() {
    if(uname) document.getElementById('inputName').value=uname;
    document.getElementById('btnCreate').onclick=createRoom; document.getElementById('btnRefresh').onclick=loadRooms;
    document.getElementById('btnUndo').onclick=requestUndo; document.getElementById('btnLeave').onclick=leaveRoom;
    document.getElementById('btnUndoAccept').onclick=()=>respondUndo(true); document.getElementById('btnUndoReject').onclick=()=>respondUndo(false);
    document.getElementById('btnBackLobby').onclick=()=>{ hideResult(); leaveRoom(); };
    const ov = document.getElementById('boardOverlay');
    ov.addEventListener('click',e=>{const p=canvasXY(e.clientX,e.clientY); if(p) tryMove(p.x,p.y);});
    ov.addEventListener('touchend',e=>{e.preventDefault(); const t=e.changedTouches[0]; const p=canvasXY(t.clientX,t.clientY); if(p) tryMove(p.x,p.y);},{passive:false});
    ov.addEventListener('mousemove',e=>{const p=canvasXY(e.clientX,e.clientY); hoverX=p?.x??-1; hoverY=p?.y??-1; drawOverlay(); const canClick=!gameOver&&localTurn===myColor&&!isMoving&&lastState?.state===1; ov.style.cursor=(canClick&&p&&!renderedMap.has(`${p.x},${p.y}`))?'pointer':'default';});
    ov.addEventListener('mouseleave',()=>{hoverX=hoverY=-1; drawOverlay(); ov.style.cursor='default';});
    let resizeTimer; window.addEventListener('resize',()=>{clearTimeout(resizeTimer); resizeTimer=setTimeout(()=>{if(document.getElementById('game-page').classList.contains('active')){initCanvas(); if(lastState?.moves) redrawAll(lastState.moves);}},180);});
    loadRooms();
}
init();
</script>
