<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="utf-8">
    <title>Zarke AI Chat</title>
    <link rel="icon" href="images/R.ico" type="image/x-icon">
    <style>
        :root {
            --primary-color: #0051ff;
            --bg-gradient: linear-gradient(135deg, #f5f7fa 0%, #c3cfe2 100%);
        }

        body {
            font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
            background: var(--bg-gradient);
            min-height: 100vh;
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .chat-container {
            background: white;
            width: 90%;
            max-width: 600px;
            height: 80vh;
            border-radius: 20px;
            box-shadow: 0 15px 35px rgba(0,0,0,0.1);
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        /* 顶部栏 */
        .chat-header {
            background: var(--primary-color);
            color: white;
            padding: 15px 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        /* 聊天窗口 */
        #chat-box {
            flex: 1;
            padding: 20px;
            overflow-y: auto;
            background: #fdfdfd;
        }

        .message {
            margin-bottom: 15px;
            max-width: 85%;
            padding: 10px 15px;
            border-radius: 15px;
            line-height: 1.5;
            word-wrap: break-word;
        }

        .user-msg {
            background: #e3f2fd;
            align-self: flex-end;
            margin-left: auto;
            color: #0d47a1;
        }

        .ai-msg {
            background: #f1f3f4;
            align-self: flex-start;
            color: #202124;
            border-left: 4px solid var(--primary-color);
        }

        /* 输入区域 */
        .input-area {
            padding: 15px;
            border-top: 1px solid #eee;
            display: flex;
            gap: 10px;
        }

        input {
            flex: 1;
            padding: 12px;
            border: 1px solid #ddd;
            border-radius: 25px;
            outline: none;
        }

        button {
            background: var(--primary-color);
            color: white;
            border: none;
            padding: 0 20px;
            border-radius: 25px;
            cursor: pointer;
            transition: 0.2s;
        }

        button:hover { opacity: 0.8; }
        
        .loading { font-style: italic; color: #888; }
    </style>
</head>
<body>

    <div class="chat-container">
        <div class="chat-header">
            <strong>Zarke Blog AI 助手</strong>
            <span style="font-size: 12px;">Qwen-30B Powered</span>
        </div>

        <div id="chat-box">
            <div class="message ai-msg">你好！我是 Zarke 的 AI 助手，有什么可以帮你的？</div>
        </div>

        <div class="input-area">
            <input type="text" id="user-input" placeholder="输入消息..." onkeypress="if(event.keyCode==13) sendMessage()">
            <button onclick="sendMessage()">发送</button>
        </div>
    </div>

    <script>
        const API_KEY = 'sk-aktxwnvxcznjkpoxpfkcjkhsnryiquhereczcdlujrtkkpcr'; // 你的 Key
        const BASE_URL = 'https://api.siliconflow.cn/v1/chat/completions';

        async function sendMessage() {
            const inputField = document.getElementById('user-input');
            const chatBox = document.getElementById('chat-box');
            const text = inputField.value.trim();

            if (!text) return;

            // 显示用户消息
            appendMessage('user-msg', text);
            inputField.value = '';

            // 显示加载状态
            const loadingDiv = appendMessage('ai-msg', '<span class="loading">思考中...</span>');

            try {
                const response = await fetch(BASE_URL, {
                    method: 'POST',
                    headers: {
                        'Authorization': `Bearer ${API_KEY}`,
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({
                        model: "Qwen/Qwen3-Omni-30B-A3B-Instruct",
                        messages: [{ role: "user", content: text }],
                        temperature: 0.7
                    })
                });

                const data = await response.json();
                const aiResponse = data.choices[0].message.content;

                // 替换加载文字为实际回答
                loadingDiv.innerHTML = aiResponse.replace(/\n/g, '<br>');

            } catch (error) {
                loadingDiv.innerText = "出错了: " + error.message;
            }

            chatBox.scrollTop = chatBox.scrollHeight;
        }

        function appendMessage(className, content) {
            const chatBox = document.getElementById('chat-box');
            const div = document.createElement('div');
            div.className = `message ${className}`;
            div.innerHTML = content;
            chatBox.appendChild(div);
            chatBox.scrollTop = chatBox.scrollHeight;
            return div;
        }
    </script>
</body>
</html>
