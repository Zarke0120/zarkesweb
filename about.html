<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>seazon | Steam Profile Experience</title>
    <style>
        :root {
            --primary: #6366f1;
            --accent: #a855f7;
            --bg: #0f172a;
            --card-bg: rgba(30, 41, 59, 0.7);
        }

        * {
            box-sizing: border-box;
        }

        body {
            margin: 0;
            padding: 16px;
            font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
            background: radial-gradient(circle at top right, #1e1b4b, #0f172a);
            color: #f8fafc;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            overflow-x: hidden;
        }

        /* 磨砂玻璃卡片 */
        .profile-card {
            width: 850px;
            max-width: 100%;
            background: var(--card-bg);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 24px;
            padding: 40px;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
            position: relative;
            overflow: hidden;
        }

        /* 顶部装饰线 - 修复贴合问题 */
        .profile-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 4px;
            background: linear-gradient(90deg, var(--primary), var(--accent));
        }

        .header {
            display: flex;
            align-items: center;
            margin-bottom: 30px;
            gap: 25px;
        }

        .avatar-wrapper {
            position: relative;
            padding: 5px;
            background: linear-gradient(45deg, var(--primary), var(--accent));
            border-radius: 20px;
            flex-shrink: 0;
        }

        .avatar {
            width: 120px;
            height: 120px;
            border-radius: 15px;
            display: block;
            background: #000;
        }

        .user-info h1 {
            margin: 0;
            font-size: 2.5em;
            letter-spacing: -1px;
            background: linear-gradient(to right, #fff, #94a3b8);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            word-break: break-word;
        }

        .level-badge {
            display: inline-block;
            background: rgba(255, 255, 255, 0.1);
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 0.9em;
            margin-top: 8px;
            color: #e2e8f0;
            border: 1px solid rgba(255, 255, 255, 0.2);
        }

        .stats-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 20px;
            margin-bottom: 30px;
        }

        .stat-item {
            background: rgba(15, 23, 42, 0.5);
            padding: 15px;
            border-radius: 16px;
            text-align: center;
            border: 1px solid rgba(255, 255, 255, 0.05);
        }

        .stat-value {
            display: block;
            font-size: 1.4em;
            font-weight: bold;
            color: var(--primary);
        }

        .stat-label {
            font-size: 0.8em;
            color: #94a3b8;
            text-transform: uppercase;
            margin-top: 4px;
        }

        .bio-section {
            line-height: 1.6;
            color: #cbd5e1;
            margin-bottom: 30px;
        }

        .bio-section p {
            margin: 0 0 12px 0;
        }

        .bio-section p:last-child {
            margin-bottom: 0;
        }

        .featured-game {
            background: linear-gradient(rgba(0,0,0,0.6), rgba(0,0,0,0.6)), 
                        url('https://shared.fastly.steamstatic.com/store_item_assets/steam/apps/730/capsule_616x353.jpg');
            background-size: cover;
            background-position: center;
            border-radius: 16px;
            padding: 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 15px;
            border: 1px solid rgba(255,255,255,0.1);
        }

        .game-info h3 { 
            margin: 0 0 8px 0; 
            color: #fff; 
        }
        .game-time { 
            font-size: 0.9em; 
            color: #fbbf24; 
        }

        .game-status {
            font-size: 0.8em; 
            background: rgba(34, 197, 94, 0.2); 
            color: #4ade80; 
            padding: 5px 10px; 
            border-radius: 8px;
            white-space: nowrap;
        }

        .badges {
            display: flex;
            gap: 15px;
            margin-top: 25px;
            flex-wrap: wrap;
        }

        .badge-icon {
            width: 45px;
            height: 45px;
            filter: drop-shadow(0 0 5px rgba(99, 102, 241, 0.5));
            transition: transform 0.3s ease;
        }

        .badge-icon:hover { transform: translateY(-5px); }

        /* ========== 响应式设计 ========== */
        
        /* 平板设备 */
        @media (max-width: 768px) {
            .profile-card {
                padding: 30px 25px;
            }
            
            .avatar {
                width: 100px;
                height: 100px;
            }
            
            .user-info h1 {
                font-size: 2em;
            }
            
            .stats-grid {
                gap: 15px;
            }
            
            .stat-value {
                font-size: 1.3em;
            }
        }

        /* 手机设备 */
        @media (max-width: 640px) {
            body {
                padding: 12px;
                align-items: flex-start;
                padding-top: 20px;
                padding-bottom: 20px;
            }
            
            .profile-card {
                padding: 25px 20px;
                border-radius: 20px;
            }
            
            .header {
                flex-direction: column;
                text-align: center;
                gap: 15px;
            }
            
            .avatar-wrapper {
                margin-right: 0;
            }
            
            .avatar {
                width: 90px;
                height: 90px;
            }
            
            .user-info h1 {
                font-size: 1.75em;
            }
            
            .level-badge {
                font-size: 0.85em;
            }
            
            .stats-grid {
                grid-template-columns: repeat(3, 1fr);
                gap: 10px;
            }
            
            .stat-item {
                padding: 12px 8px;
            }
            
            .stat-value {
                font-size: 1.2em;
            }
            
            .stat-label {
                font-size: 0.7em;
            }
            
            .bio-section {
                font-size: 0.95em;
            }
            
            .featured-game {
                flex-direction: column;
                text-align: center;
                padding: 20px 15px;
            }
            
            .game-info h3 {
                font-size: 1.1em;
            }
            
            .game-time {
                font-size: 0.85em;
            }
            
            .badges {
                justify-content: center;
                gap: 12px;
            }
            
            .badge-icon {
                width: 40px;
                height: 40px;
            }
        }

        /* 小屏手机 */
        @media (max-width: 380px) {
            .profile-card {
                padding: 20px 15px;
            }
            
            .avatar {
                width: 75px;
                height: 75px;
            }
            
            .avatar-wrapper {
                border-radius: 16px;
                padding: 4px;
            }
            
            .avatar {
                border-radius: 12px;
            }
            
            .user-info h1 {
                font-size: 1.5em;
            }
            
            .stats-grid {
                gap: 8px;
            }
            
            .stat-item {
                padding: 10px 6px;
                border-radius: 12px;
            }
            
            .stat-value {
                font-size: 1.1em;
            }
            
            .featured-game {
                padding: 15px 12px;
                border-radius: 12px;
            }
        }
    </style>
</head>
<body>

<div class="profile-card">
    <div class="header">
        <div class="avatar-wrapper">
            <img class="avatar" src="https://avatars.fastly.steamstatic.com/091654896ced9b5cceb336163938350df08b83a8_full.jpg" alt="seazon">
        </div>
        <div class="user-info">
            <h1>seazon</h1>
            <div class="level-badge">Steam Level 8</div>
        </div>
    </div>

    <div class="stats-grid">
        <div class="stat-item">
            <span class="stat-value">6 Years</span>
            <span class="stat-label">服役时长</span>
        </div>
        <div class="stat-item">
            <span class="stat-value">39</span>
            <span class="stat-label">收藏游戏</span>
        </div>
        <div class="stat-item">
            <span class="stat-value">15</span>
            <span class="stat-label">游戏评测</span>
        </div>
    </div>

    <div class="bio-section">
        <p>「 在硝烟中寻找节奏，在六年里沉淀热爱。 」</p>
        <p>专注于竞技战术对抗，深耕 Counter-Strike 系列。不仅是一名追求极致枪法的玩家，也是一名乐于分享游戏体验的深度评论者。不论是硬核竞技还是独立精品，都在我的收藏清单中熠熠生辉。</p>
    </div>

    <div class="featured-game">
        <div class="game-info">
            <h3>Counter-Strike 2</h3>
            <span class="game-time">🕒 已游玩 884 小时</span>
        </div>
        <div class="game-status">正在战斗中</div>
    </div>

    <div class="badges">
        <img class="badge-icon" src="https://community.fastly.steamstatic.com/public/images/badges/02_years/steamyears6_80.png" title="6年服务">
        <img class="badge-icon" src="https://community.fastly.steamstatic.com/public/images/badges/13_gamecollector/25_80.png" title="25+游戏收藏">
        <img class="badge-icon" src="https://community.fastly.steamstatic.com/public/images/badges/01_community/community02_80.png" title="社区领袖">
        <img class="badge-icon" src="https://community.fastly.steamstatic.com/public/images/badges/generic/Replay2022_80.png" title="Steam年度回顾">
    </div>
</div>

</body>
</html>
