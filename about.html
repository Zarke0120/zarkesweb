<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="utf-8">
    <title>Zarke Blog - API Config</title>
    <link rel="icon" href="images/R.ico" type="image/x-icon">
    <style>
        :root {
            --primary-color: #0051ff;
            --bg-gradient: linear-gradient(135deg, #f5f7fa 0%, #c3cfe2 100%);
        }

        body {
            font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
            background: var(--bg-gradient);
            min-height: 100vh;
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            color: #333;
        }

        .container {
            background: white;
            padding: 2rem;
            border-radius: 16px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.1);
            text-align: center;
            max-width: 500px;
            width: 90%;
        }

        h1 { color: #2d3436; margin-bottom: 0.5rem; }
        span { color: #636e72; font-size: 0.9rem; }

        .image-box {
            margin: 20px 0;
            border-radius: 8px;
            overflow: hidden;
        }
        
        .image-box img {
            max-width: 100%;
            height: auto;
            transition: transform 0.3s;
        }
        .image-box img:hover { transform: scale(1.05); }

        .config-panel {
            background: #f8f9fa;
            border-left: 4px solid var(--primary-color);
            padding: 15px;
            margin: 20px 0;
            text-align: left;
            font-family: 'Courier New', Courier, monospace;
            font-size: 0.85rem;
            word-break: break-all;
        }

        .config-item { margin-bottom: 8px; }
        .label { font-weight: bold; color: var(--primary-color); }

        a {
            text-decoration: none;
            color: var(--primary-color);
            font-weight: 500;
            transition: opacity 0.2s;
        }
        a:hover { opacity: 0.7; }
    </style>
</head>
<body>

    <div class="container">
        <h1>你为什么要点进来</h1>
        <span>这其实不是 Cloudflare 官网，是 Zarke 的领地</span>

        <div class="image-box">
            <img src="images/x2.png" alt="熊二凝视">
        </div>

        <div class="config-panel">
            <div class="config-item"><span class="label">Model:</span> Qwen/Qwen3-Omni-30B-A3B-Instruct</div>
            <div class="config-item"><span class="label">BaseURL:</span> https://api.siliconflow.cn/v1</div>
            <div class="config-item"><span class="label">API Key:</span> sk-akt...pcr</div>
        </div>

        <a href=".">← 返回 Zarke Blog 首页</a>
    </div>

</body>
</html>
