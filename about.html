<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>seazon | Steam Profile Experience</title>
    <style>
        :root {
            --primary: #6366f1;
            --accent: #a855f7;
            --bg: #0f172a;
            --card-bg: rgba(30, 41, 59, 0.7);
        }

        body {
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
            background: radial-gradient(circle at top right, #1e1b4b, #0f172a);
            color: #f8fafc;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            overflow-x: hidden;
        }

        /* 磨砂玻璃卡片 */
        .profile-card {
            width: 850px;
            background: var(--card-bg);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 24px;
            padding: 40px;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
            position: relative;
        }

        /* 顶部装饰线 */
        .profile-card::before {
            content: '';
            position: absolute;
            top: 0; left: 0; right: 0; height: 4px;
            background: linear-gradient(90deg, var(--primary), var(--accent));
            border-radius: 24px 24px 0 0;
        }

        .header {
            display: flex;
            align-items: center;
            margin-bottom: 30px;
        }

        .avatar-wrapper {
            position: relative;
            padding: 5px;
            background: linear-gradient(45deg, var(--primary), var(--accent));
            border-radius: 20px;
            margin-right: 25px;
        }

        .avatar {
            width: 120px;
            height: 120px;
            border-radius: 15px;
            display: block;
            background: #000;
        }

        .user-info h1 {
            margin: 0;
            font-size: 2.5em;
            letter-spacing: -1px;
            background: linear-gradient(to right, #fff, #94a3b8);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .level-badge {
            display: inline-block;
            background: rgba(255, 255, 255, 0.1);
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 0.9em;
            margin-top: 8px;
            color: #e2e8f0;
            border: 1px solid rgba(255, 255, 255, 0.2);
        }

        .stats-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 20px;
            margin-bottom: 30px;
        }

        .stat-item {
            background: rgba(15, 23, 42, 0.5);
            padding: 15px;
            border-radius: 16px;
            text-align: center;
            border: 1px solid rgba(255, 255, 255, 0.05);
        }

        .stat-value {
            display: block;
            font-size: 1.4em;
            font-weight: bold;
            color: var(--primary);
        }

        .stat-label {
            font-size: 0.8em;
            color: #94a3b8;
            text-transform: uppercase;
            margin-top: 4px;
        }

        .bio-section {
            line-height: 1.6;
            color: #cbd5e1;
            margin-bottom: 30px;
        }

        .featured-game {
            background: linear-gradient(rgba(0,0,0,0.6), rgba(0,0,0,0.6)), 
                        url('https://shared.fastly.steamstatic.com/store_item_assets/steam/apps/730/capsule_616x353.jpg');
            background-size: cover;
            background-position: center;
            border-radius: 16px;
            padding: 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border: 1px solid rgba(255,255,255,0.1);
        }

        .game-info h3 { margin: 0; color: #fff; }
        .game-time { font-size: 0.9em; color: #fbbf24; }

        .badges {
            display: flex;
            gap: 15px;
            margin-top: 25px;
        }

        .badge-icon {
            width: 45px;
            height: 45px;
            filter: drop-shadow(0 0 5px rgba(99, 102, 241, 0.5));
            transition: transform 0.3s ease;
        }

        .badge-icon:hover { transform: translateY(-5px); }
    </style>
</head>
<body>

<div class="profile-card">
    <div class="header">
        <div class="avatar-wrapper">
            <img class="avatar" src="https://avatars.fastly.steamstatic.com/091654896ced9b5cceb336163938350df08b83a8_full.jpg" alt="seazon">
        </div>
        <div class="user-info">
            <h1>seazon</h1>
            <div class="level-badge">Steam Level 8</div>
        </div>
    </div>

    <div class="stats-grid">
        <div class="stat-item">
            <span class="stat-value">6 Years</span>
            <span class="stat-label">服役时长</span>
        </div>
        <div class="stat-item">
            <span class="stat-value">39</span>
            <span class="stat-label">收藏游戏</span>
        </div>
        <div class="stat-item">
            <span class="stat-value">15</span>
            <span class="stat-label">游戏评测</span>
        </div>
    </div>

    <div class="bio-section">
        <p>「 在硝烟中寻找节奏，在六年里沉淀热爱。 」</p>
        <p>专注于竞技战术对抗，深耕 Counter-Strike 系列。不仅是一名追求极致枪法的玩家，也是一名乐于分享游戏体验的深度评论者。不论是硬核竞技还是独立精品，都在我的收藏清单中熠熠生辉。</p>
    </div>

    <div class="featured-game">
        <div class="game-info">
            <h3>Counter-Strike 2</h3>
            <span class="game-time">🕒 已游玩 884 小时</span>
        </div>
        <div class="game-status" style="font-size: 0.8em; background: rgba(34, 197, 94, 0.2); color: #4ade80; padding: 5px 10px; border-radius: 8px;">
            正在战斗中
        </div>
    </div>

    <div class="badges">
        <img class="badge-icon" src="https://community.fastly.steamstatic.com/public/images/badges/02_years/steamyears6_80.png" title="6年服务">
        <img class="badge-icon" src="https://community.fastly.steamstatic.com/public/images/badges/13_gamecollector/25_80.png" title="25+游戏收藏">
        <img class="badge-icon" src="https://community.fastly.steamstatic.com/public/images/badges/01_community/community02_80.png" title="社区领袖">
        <img class="badge-icon" src="https://community.fastly.steamstatic.com/public/images/badges/generic/Replay2022_80.png" title="Steam年度回顾">
    </div>
</div>

</body>
</html>
